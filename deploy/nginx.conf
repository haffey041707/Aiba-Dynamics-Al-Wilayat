# Al-Wilayat — nginx reverse proxy
# Put this at /etc/nginx/sites-available/al-wilayat and symlink it into
# sites-enabled, then replace your-domain.com with your real domain.
# After it works on http, run certbot to add free HTTPS (see DEPLOY.md).

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    # Allow PDF / upload-sized requests through the proxy.
    client_max_body_size 25m;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Streaming (AI assistant) — don't buffer the response.
        proxy_buffering    off;
        proxy_read_timeout 120s;
    }
}
